<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="author" content="{{ page.author | default: site.author }}">
    
    {% seo %}
    {% feed_meta %}
    
    <link rel="stylesheet" href="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/css/fontawesome.min.css">
    <script src="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/js/all.min.js"></script>
    
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    
    {% if page.extra_css %}
    <style>{{ page.extra_css }}</style>
    {% endif %}
</head>
<body>
    {% include header.html %}
    
    <main id="main-content" class="container">
        <div class="window">
            <div class="window-header">
                <div class="close-btn" onclick="goHome()"></div>
                <div class="window-title" id="window-title">{{ page.window_title | default: page.title | default: 'Macintosh HD' }}</div>
                <div class="close-btn" style="visibility: hidden;"></div>
            </div>
            
            <div id="content-area" class="content-area">
                {{ content }}
            </div>
        </div>
    </main>
    
    {% include footer.html %}
    
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
    {% if page.extra_js %}
    <script>{{ page.extra_js }}</script>
    {% endif %}
</body>
</html>
